<!DOCTYPE html>
<html>
<head>
    <title>Login • Instagram</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
        }

        body{
            background:#fafafa;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .page{
            width:100%;
            max-width:935px;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:40px;
        }

        .left{
            width:420px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .phone{
            width:380px;
            height:560px;
            background:linear-gradient(135deg,#fdfbfb,#ebedee);
            border-radius:32px;
            border:10px solid #111;
            position:relative;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
        }

        .phone-notch{
            position:absolute;
            top:8px;
            left:50%;
            transform:translateX(-50%);
            width:120px;
            height:18px;
            background:#111;
            border-radius:0 0 14px 14px;
            z-index:2;
        }

        .phone-screen{
            padding:30px 18px;
            height:100%;
            background:#fff;
        }

        .mock-stories{
            display:flex;
            gap:12px;
            margin-top:30px;
            margin-bottom:20px;
            overflow:hidden;
        }

        .mock-story{
            text-align:center;
            min-width:62px;
            font-size:10px;
            color:#555;
        }

        .mock-ring{
            width:54px;
            height:54px;
            border-radius:50%;
            padding:2px;
            margin:0 auto 6px;
            background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
        }

        .mock-inner{
            width:100%;
            height:100%;
            border-radius:50%;
            background:#fff;
            padding:2px;
        }

        .mock-inner img{
            width:100%;
            height:100%;
            border-radius:50%;
            object-fit:cover;
        }

        .mock-post{
            border:1px solid #efefef;
            border-radius:12px;
            overflow:hidden;
        }

        .mock-post-head{
            display:flex;
            align-items:center;
            gap:10px;
            padding:12px;
            font-size:13px;
            font-weight:bold;
        }

        .mock-avatar{
            width:28px;
            height:28px;
            border-radius:50%;
            background:#ddd;
        }

        .mock-post img{
            width:100%;
            height:260px;
            object-fit:cover;
        }

        .mock-actions{
            padding:10px 12px;
            font-size:18px;
        }

        .right{
            width:350px;
        }

        .box{
            background:#fff;
            border:1px solid #dbdbdb;
            padding:40px 40px 24px;
            text-align:center;
            margin-bottom:10px;
        }

        .logo{
            font-size:42px;
            font-weight:bold;
            margin-bottom:30px;
            font-family:"Segoe Script", cursive;
        }

        .input{
            width:100%;
            background:#fafafa;
            border:1px solid #dbdbdb;
            border-radius:4px;
            padding:10px;
            margin-bottom:8px;
            font-size:12px;
        }

        .btn{
            width:100%;
            border:none;
            background:#0095f6;
            color:#fff;
            border-radius:8px;
            padding:9px;
            margin-top:8px;
            font-weight:bold;
            cursor:pointer;
        }

        .btn:hover{
            opacity:0.92;
        }

        .divider{
            display:flex;
            align-items:center;
            gap:18px;
            margin:18px 0;
            color:#8e8e8e;
            font-size:13px;
            font-weight:bold;
        }

        .divider::before,
        .divider::after{
            content:"";
            flex:1;
            height:1px;
            background:#dbdbdb;
        }

        .bottom-box{
            background:#fff;
            border:1px solid #dbdbdb;
            text-align:center;
            padding:20px;
            font-size:14px;
        }

        .bottom-box a{
            text-decoration:none;
            color:#0095f6;
            font-weight:bold;
        }

        .error{
            color:#b00020;
            background:#ffe8e8;
            border:1px solid #ffb3b3;
            padding:10px;
            margin-top:12px;
            border-radius:6px;
            text-align:left;
            font-size:13px;
        }

        @media(max-width:875px){
            .left{
                display:none;
            }
            .page{
                max-width:350px;
            }
        }
    </style>
</head>
<body>

<div class="page">

    <div class="left">
        <div class="phone">
            <div class="phone-notch"></div>
            <div class="phone-screen">

                <div class="mock-stories">
                    <div class="mock-story">
                        <div class="mock-ring"><div class="mock-inner"><img src="https://picsum.photos/80?1"></div></div>
                        vishnu
                    </div>
                    <div class="mock-story">
                        <div class="mock-ring"><div class="mock-inner"><img src="https://picsum.photos/80?2"></div></div>
                        arun
                    </div>
                    <div class="mock-story">
                        <div class="mock-ring"><div class="mock-inner"><img src="https://picsum.photos/80?3"></div></div>
                        sam
                    </div>
                    <div class="mock-story">
                        <div class="mock-ring"><div class="mock-inner"><img src="https://picsum.photos/80?4"></div></div>
                        ananth
                    </div>
                </div>

                <div class="mock-post">
                    <div class="mock-post-head">
                        <div class="mock-avatar"></div>
                        instagram_clone
                    </div>
                    <img src="https://picsum.photos/500/700?5">
                    <div class="mock-actions">❤️ 💬 📤</div>
                </div>

            </div>
        </div>
    </div>

    <div class="right">
        <div class="box">
            <div class="logo">Instagram</div>

            <form method="POST" action="/login/">
                {% csrf_token %}
                <input class="input" type="text" name="username" placeholder="Phone number, username, or email">
                <input class="input" type="password" name="password" placeholder="Password">
                <button class="btn" type="submit">Log in</button>
            </form>

            <div class="divider">OR</div>

            <div style="font-size:14px; color:#385185; font-weight:bold; margin-bottom:14px;">
                Log in with Facebook
            </div>

            <div style="font-size:12px; color:#00376b;">Forgot password?</div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
        </div>

        <div class="bottom-box">
            Don't have an account? <a href="/register/">Sign up</a>
        </div>
    </div>

</div>

</body>
</html>
