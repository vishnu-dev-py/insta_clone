<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#fafafa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .box{
            width:350px;
            background:#fff;
            border:1px solid #dbdbdb;
            padding:30px;
            border-radius:10px;
        }
        input{
            width:100%;
            padding:10px;
            margin-bottom:12px;
            border:1px solid #dbdbdb;
            border-radius:8px;
        }
        button{
            width:100%;
            padding:10px;
            background:#0095f6;
            color:white;
            border:none;
            border-radius:8px;
            font-weight:bold;
        }
        a{
            text-decoration:none;
        }
        .error{
            color:red;
            margin-top:10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            <input name="username" placeholder="Username">
            <input name="password" type="password" placeholder="Password">
            <button type="submit">Login</button>
        </form>
        <p style="margin-top:15px;">No account? <a href="/register/">Register</a></p>
        <p class="error">{{ error }}</p>
    </div>
</body>
</html>
