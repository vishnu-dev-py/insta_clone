<!DOCTYPE html>
<html>
<head>
    <title>Instagram Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family: Arial, sans-serif;
            background:#fafafa;
            color:#262626;
        }

        .app{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:245px;
            background:#fff;
            border-right:1px solid #dbdbdb;
            padding:24px 14px;
            position:fixed;
            left:0;
            top:0;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            margin-bottom:30px;
            padding:10px 12px;
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .menu-item{
            display:flex;
            align-items:center;
            gap:14px;
            padding:14px 12px;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
        }

        .menu-item:hover{
            background:#f2f2f2;
        }

        .menu-item.active{
            font-weight:bold;
        }

        .menu-icon{
            width:24px;
            text-align:center;
            font-size:24px;
        }

        .content{
            margin-left:245px;
            width:calc(100% - 245px);
            padding:30px 20px;
            display:flex;
            justify-content:center;
        }

        .center{
            width:700px;
        }

        .panel{
            display:none;
        }

        .panel.active{
            display:block;
        }

        .card{
            background:#fff;
            border:1px solid #dbdbdb;
            border-radius:8px;
            margin-bottom:20px;
            overflow:hidden;
        }

        .section{
            padding:18px;
        }

        .title{
            font-size:20px;
            font-weight:bold;
            margin-bottom:14px;
        }

        .field{
            width:100%;
            padding:12px;
            border:1px solid #dbdbdb;
            border-radius:8px;
            outline:none;
            margin-bottom:12px;
        }

        .btn{
            background:#0095f6;
            color:white;
            border:none;
            padding:10px 16px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .btn.secondary{
            background:#f2f2f2;
            color:#262626;
        }

        .stories-bar{
            display:flex;
            gap:18px;
            overflow-x:auto;
            padding:16px 12px;
        }

        .story-item{
            min-width:78px;
            text-align:center;
            font-size:12px;
        }

        .story-ring{
            width:66px;
            height:66px;
            margin:0 auto 6px;
            border-radius:50%;
            padding:3px;
            background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
        }

        .story-inner{
            width:100%;
            height:100%;
            border-radius:50%;
            background:#fff;
            padding:2px;
        }

        .story-inner img{
            width:100%;
            height:100%;
            border-radius:50%;
            object-fit:cover;
        }

        .post-card{
            background:#fff;
            border:1px solid #dbdbdb;
            border-radius:8px;
            margin-bottom:20px;
            overflow:hidden;
        }

        .post-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 16px;
        }

        .post-user{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .avatar{
            width:36px;
            height:36px;
            border-radius:50%;
            background:#ddd;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
        }

        .username{
            font-weight:bold;
            font-size:14px;
        }

        .post-image-wrap{
            position:relative;
            background:#000;
        }

        .post-image{
            width:100%;
            max-height:700px;
            object-fit:cover;
            display:block;
        }

        .heart-overlay{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%) scale(0);
            font-size:90px;
            opacity:0;
            transition:all .25s ease;
            pointer-events:none;
        }

        .heart-overlay.show{
            transform:translate(-50%, -50%) scale(1);
            opacity:1;
        }

        .post-actions{
            display:flex;
            gap:16px;
            padding:12px 16px 8px;
            font-size:24px;
        }

        .action{
            cursor:pointer;
        }

        .likes-text{
            padding:0 16px 8px;
            font-weight:bold;
            font-size:14px;
        }

        .caption{
            padding:0 16px 10px;
            font-size:14px;
        }

        .comments-box{
            padding:0 16px 10px;
        }

        .comment{
            display:flex;
            justify-content:space-between;
            gap:10px;
            margin-bottom:8px;
            font-size:14px;
        }

        .comment-left{
            flex:1;
        }

        .delete-btn{
            border:none;
            background:none;
            color:#ed4956;
            cursor:pointer;
        }

        .comment-row{
            border-top:1px solid #efefef;
            display:flex;
            gap:10px;
            padding:12px 16px;
        }

        .comment-row input{
            flex:1;
            border:none;
            outline:none;
            font-size:14px;
        }

        .comment-btn{
            border:none;
            background:none;
            color:#0095f6;
            font-weight:bold;
            cursor:pointer;
        }

        .chat-box{
            height:420px;
            overflow-y:auto;
            padding:16px;
            background:#fafafa;
            border-top:1px solid #efefef;
            border-bottom:1px solid #efefef;
        }

        .chat-message{
            background:#fff;
            border:1px solid #efefef;
            border-radius:12px;
            padding:10px 12px;
            margin-bottom:10px;
        }

        .chat-user{
            font-weight:bold;
            margin-bottom:4px;
        }

        .chat-input-row{
            display:flex;
            gap:10px;
            padding:16px;
        }

        .chat-input-row input{
            flex:1;
            padding:10px 12px;
            border:1px solid #dbdbdb;
            border-radius:8px;
        }

        .search-result{
            padding:14px;
            border-bottom:1px solid #efefef;
            cursor:pointer;
        }

        .search-result:hover{
            background:#fafafa;
        }

        .profile-header{
            padding:22px;
            display:flex;
            gap:20px;
            align-items:flex-start;
        }

        .profile-avatar{
            width:90px;
            height:90px;
            border-radius:50%;
            background:#ddd;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:28px;
            font-weight:bold;
        }

        .profile-meta h2{
            margin-bottom:8px;
        }

        .profile-meta p{
            color:#555;
            margin-bottom:10px;
        }

        .profile-grid{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:8px;
            padding:16px;
        }

        .profile-grid img{
            width:100%;
            aspect-ratio:1/1;
            object-fit:cover;
            border-radius:6px;
        }

        .empty{
            padding:20px;
            color:#8e8e8e;
        }

        .top-actions{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:14px;
        }
    </style>
</head>
<body>

<div class="app">

    <div class="sidebar">
        <div>
            <div class="logo">Instagram</div>

            <div class="menu">
                <div class="menu-item active" id="menu-home" onclick="showPanel('home')"><span class="menu-icon">🏠</span><span>Home</span></div>
                <div class="menu-item" id="menu-search" onclick="showPanel('search')"><span class="menu-icon">🔍</span><span>Search</span></div>
                <div class="menu-item"><span class="menu-icon">🎬</span><span>Reels</span></div>
                <div class="menu-item" id="menu-messages" onclick="showPanel('messages')"><span class="menu-icon">💬</span><span>Messages</span></div>
                <div class="menu-item"><span class="menu-icon">❤️</span><span>Notifications</span></div>
                <div class="menu-item" id="menu-create" onclick="showPanel('create')"><span class="menu-icon">➕</span><span>Create</span></div>
                <div class="menu-item" id="menu-profile" onclick="openMyProfile()"><span class="menu-icon">👤</span><span>Profile</span></div>
            </div>
        </div>

        <div class="menu">
            <a href="/logout/" style="text-decoration:none; color:inherit;">
                <div class="menu-item"><span class="menu-icon">↩️</span><span>Logout</span></div>
            </a>
        </div>
    </div>

    <div class="content">
        <div class="center">

            <!-- HOME -->
            <div id="panel-home" class="panel active">
                <div class="card">
                    <div id="storiesContainer" class="stories-bar"></div>
                </div>
                <div id="feedPosts"></div>
            </div>

            <!-- CREATE -->
            <div id="panel-create" class="panel">
                <div class="card section">
                    <div class="title">Create Post</div>
                    <form id="postForm">
                        <input class="field" type="file" id="image" required>
                        <input class="field" type="text" id="caption" placeholder="Write a caption...">
                        <button class="btn" type="submit">Post</button>
                    </form>
                </div>

                <div class="card section">
                    <div class="title">Add Story</div>
                    <input class="field" type="file" id="storyImage">
                    <button class="btn" type="button" onclick="uploadStory()">Add Story</button>
                </div>
            </div>

            <!-- SEARCH -->
            <div id="panel-search" class="panel">
                <div class="card section">
                    <div class="title">Search Users</div>
                    <input class="field" type="text" id="searchInput" placeholder="Search username..." oninput="searchUsers()">
                    <div id="searchResults"></div>
                </div>
            </div>

            <!-- MESSAGES -->
            <div id="panel-messages" class="panel">
                <div class="card">
                    <div class="section">
                        <div class="top-actions">
                            <div class="title" style="margin:0;">Messages</div>
                            <div id="chatStatus">Connecting...</div>
                        </div>
                    </div>

                    <div id="chatMessages" class="chat-box"></div>

                    <div class="chat-input-row">
                        <input type="text" id="chatInput" placeholder="Type message">
                        <button class="btn" type="button" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>

            <!-- PROFILE -->
            <div id="panel-profile" class="panel">
                <div class="card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profileAvatar">U</div>
                        <div class="profile-meta">
                            <h2 id="profileUsername">user</h2>
                            <p id="profileBio">No bio</p>

                            <div id="myProfileEdit" style="display:none;">
                                <textarea id="bioInput" class="field" rows="3" placeholder="Write your bio..."></textarea>
                                <button class="btn" type="button" onclick="saveMyBio()">Save Bio</button>
                            </div>
                        </div>
                    </div>

                    <div class="profile-grid" id="profilePosts"></div>
                    <div class="empty" id="profileEmpty" style="display:none;">No posts yet.</div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
const CURRENT_USERNAME = "{{ username|escapejs }}";

const API_POSTS = "/api/posts/";
const API_COMMENTS = "/api/comments/";
const API_LIKE = "/api/like/";
const API_DELETE_COMMENT = "/api/comments/delete/";
const API_STORIES = "/api/stories/";
const API_SEARCH_USERS = "/api/search-users/";
const API_MY_PROFILE = "/api/my-profile/";
const API_MY_PROFILE_UPDATE = "/api/my-profile/update/";

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const CSRF_TOKEN = getCookie("csrftoken");

function setActiveMenu(menuId){
    document.querySelectorAll(".menu-item").forEach(item => item.classList.remove("active"));
    const current = document.getElementById(menuId);
    if(current){
        current.classList.add("active");
    }
}

function showPanel(name){
    document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
    document.getElementById(`panel-${name}`).classList.add("active");

    if(name === "home"){
        setActiveMenu("menu-home");
        loadStories();
        loadFeed();
    }
    if(name === "create"){
        setActiveMenu("menu-create");
    }
    if(name === "search"){
        setActiveMenu("menu-search");
    }
    if(name === "messages"){
        setActiveMenu("menu-messages");
    }
}

document.getElementById("postForm").onsubmit = async function(e){
    e.preventDefault();

    let imageFile = document.getElementById("image").files[0];
    let caption = document.getElementById("caption").value;

    if(!imageFile){
        alert("Please choose an image");
        return;
    }

    let formData = new FormData();
    formData.append("image", imageFile);
    formData.append("caption", caption);

    try{
        const res = await fetch(API_POSTS,{
            method:"POST",
            body:formData,
            credentials:"same-origin",
            headers:{
                "X-CSRFToken": CSRF_TOKEN
            }
        });

        if(!res.ok){
            const errorText = await res.text();
            console.log("Post create error response:", errorText);
            alert("Post create failed");
            return;
        }

        await res.json();
        document.getElementById("postForm").reset();
        showPanel("home");
    }catch(error){
        console.log("Post create error:", error);
    }
};

async function uploadStory(){
    let file = document.getElementById("storyImage").files[0];

    if(!file){
        alert("Choose an image for story");
        return;
    }

    let formData = new FormData();
    formData.append("image", file);

    try{
        const res = await fetch(API_STORIES, {
            method:"POST",
            body:formData,
            credentials:"same-origin",
            headers:{
                "X-CSRFToken": CSRF_TOKEN
            }
        });

        if(!res.ok){
            const errorText = await res.text();
            console.log("Story upload error response:", errorText);
            alert("Story upload failed");
            return;
        }

        await res.json();
        document.getElementById("storyImage").value = "";
        showPanel("home");
    }catch(error){
        console.log("Story upload error:", error);
    }
}

function loadStories(){
    fetch(API_STORIES, { credentials:"same-origin" })
    .then(res=>res.json())
    .then(stories=>{
        let html = "";

        stories.forEach(story=>{
            html += `
                <div class="story-item">
                    <div class="story-ring">
                        <div class="story-inner">
                            <img src="${story.image}" alt="story" onerror="this.style.display='none'">
                        </div>
                    </div>
                    <div>${story.user_name ? story.user_name : "user"}</div>
                </div>
            `;
        });

        if(html === ""){
            html = `<div class="empty">No stories yet.</div>`;
        }

        document.getElementById("storiesContainer").innerHTML = html;
    })
    .catch(error=>{
        console.log("Load stories error:", error);
    });
}

function renderPostCard(post){
    let imageHtml = "";
    if(post.image){
        imageHtml = `
            <div class="post-image-wrap" ondblclick="doubleTapLike(${post.id})">
                <img class="post-image" src="${post.image}" alt="post image" onerror="this.style.display='none'">
                <div class="heart-overlay" id="heart-${post.id}">❤️</div>
            </div>
        `;
    }

    return `
        <div class="post-card">
            <div class="post-header">
                <div class="post-user">
                    <div class="avatar">${(post.user_name ? post.user_name[0] : "U").toUpperCase()}</div>
                    <div class="username">${post.user_name ? post.user_name : "User"}</div>
                </div>
                <div>⋯</div>
            </div>

            ${imageHtml}

            <div class="post-actions">
                <span class="action" onclick="likePost(${post.id})">❤️</span>
                <span class="action">💬</span>
            </div>

            <div class="likes-text">${post.likes_count ? post.likes_count : 0} likes</div>

            <div class="caption">
                <b>${post.user_name ? post.user_name : "User"}</b> ${post.caption ? post.caption : ""}
            </div>

            <div class="comments-box" id="comments-${post.id}"></div>

            <div class="comment-row">
                <input id="comment-input-${post.id}" type="text" placeholder="Add a comment...">
                <button class="comment-btn" type="button" onclick="addComment(${post.id})">Post</button>
            </div>
        </div>
    `;
}

function loadFeed(){
    fetch(API_POSTS, { credentials:"same-origin" })
    .then(res=>res.json())
    .then(posts=>{
        let html = "";
        posts.forEach(post=>{
            html += renderPostCard(post);
        });

        if(html === ""){
            html = `<div class="card"><div class="empty">No posts yet.</div></div>`;
        }

        document.getElementById("feedPosts").innerHTML = html;
        loadComments();
    })
    .catch(error=>{
        console.log("Load posts error:", error);
    });
}

function addComment(postId){
    let textBox = document.getElementById(`comment-input-${postId}`);
    let text = textBox.value.trim();

    if(text === ""){
        alert("Write a comment");
        return;
    }

    fetch(API_COMMENTS,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken": CSRF_TOKEN
        },
        credentials:"same-origin",
        body:JSON.stringify({
            post: postId,
            text: text
        })
    })
    .then(res=>res.json())
    .then(data=>{
        textBox.value = "";
        loadFeed();
    })
    .catch(error=>{
        console.log("Comment create error:", error);
    });
}

function loadComments(){
    fetch(API_COMMENTS, { credentials:"same-origin" })
    .then(res=>res.json())
    .then(comments=>{
        document.querySelectorAll("[id^='comments-']").forEach(box=>{
            box.innerHTML = "";
        });

        comments.forEach(comment=>{
            let box = document.getElementById(`comments-${comment.post}`);

            if(box){
                box.innerHTML += `
                    <div class="comment">
                        <div class="comment-left">
                            <b>${comment.user_name ? comment.user_name : "User"}</b> ${comment.text}
                        </div>
                        <button class="delete-btn" type="button" onclick="deleteComment(${comment.id})">Delete</button>
                    </div>
                `;
            }
        });
    })
    .catch(error=>{
        console.log("Load comments error:", error);
    });
}

function likePost(postId){
    fetch(API_LIKE,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken": CSRF_TOKEN
        },
        credentials:"same-origin",
        body:JSON.stringify({
            post: postId
        })
    })
    .then(res=>res.json())
    .then(data=>{
        loadFeed();
    })
    .catch(error=>{
        console.log("Like error:", error);
    });
}

function doubleTapLike(postId){
    likePost(postId);

    let heart = document.getElementById(`heart-${postId}`);
    if(heart){
        heart.classList.add("show");
        setTimeout(()=>{
            heart.classList.remove("show");
        }, 700);
    }
}

function deleteComment(commentId){
    fetch(`${API_DELETE_COMMENT}${commentId}/`,{
        method:"DELETE",
        headers:{
            "X-CSRFToken": CSRF_TOKEN
        },
        credentials:"same-origin"
    })
    .then(()=>{
        loadFeed();
    })
    .catch(error=>{
        console.log("Delete comment error:", error);
    });
}

function searchUsers(){
    const q = document.getElementById("searchInput").value.trim();

    fetch(`${API_SEARCH_USERS}?q=${encodeURIComponent(q)}`, { credentials:"same-origin" })
    .then(res=>res.json())
    .then(users=>{
        let html = "";

        users.forEach(user=>{
            html += `
                <div class="search-result" onclick="openUserProfile(${user.id})">
                    <div><b>${user.username}</b></div>
                    <div style="color:#8e8e8e; font-size:13px;">${user.bio ? user.bio : ""}</div>
                </div>
            `;
        });

        if(html === ""){
            html = `<div class="empty">No users found.</div>`;
        }

        document.getElementById("searchResults").innerHTML = html;
    })
    .catch(error=>{
        console.log("Search users error:", error);
    });
}

function renderProfile(data, isMine){
    document.querySelectorAll(".panel").forEach(panel => panel.classList.remove("active"));
    document.getElementById("panel-profile").classList.add("active");

    setActiveMenu("menu-profile");

    document.getElementById("profileUsername").innerText = data.username;
    document.getElementById("profileBio").innerText = data.bio ? data.bio : "No bio";
    document.getElementById("profileAvatar").innerText = data.username[0].toUpperCase();

    const editBox = document.getElementById("myProfileEdit");
    if(isMine){
        editBox.style.display = "block";
        document.getElementById("bioInput").value = data.bio ? data.bio : "";
    }else{
        editBox.style.display = "none";
    }

    let grid = "";
    data.posts.forEach(post=>{
        if(post.image){
            grid += `<img src="${post.image}" alt="post" onerror="this.style.display='none'">`;
        }
    });

    document.getElementById("profilePosts").innerHTML = grid;
    document.getElementById("profileEmpty").style.display = grid === "" ? "block" : "none";
}

function openMyProfile(){
    fetch(API_MY_PROFILE, { credentials:"same-origin" })
    .then(res=>res.json())
    .then(data=>{
        renderProfile(data, true);
    })
    .catch(error=>{
        console.log("My profile error:", error);
    });
}

function openUserProfile(userId){
    fetch(`/api/users/${userId}/profile/`, { credentials:"same-origin" })
    .then(res=>res.json())
    .then(data=>{
        renderProfile(data, false);
    })
    .catch(error=>{
        console.log("User profile error:", error);
    });
}

function saveMyBio(){
    const bio = document.getElementById("bioInput").value;

    fetch(API_MY_PROFILE_UPDATE,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken": CSRF_TOKEN
        },
        credentials:"same-origin",
        body:JSON.stringify({ bio: bio })
    })
    .then(res=>res.json())
    .then(data=>{
        openMyProfile();
    })
    .catch(error=>{
        console.log("Save bio error:", error);
    });
}

// CHAT
const chatStatus = document.getElementById("chatStatus");
const chatMessages = document.getElementById("chatMessages");
const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
const chatSocket = new WebSocket(protocol + window.location.host + "/ws/chat/");

chatSocket.onopen = function() {
    chatStatus.innerText = "Connected";
};

chatSocket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    chatMessages.innerHTML += `
        <div class="chat-message">
            <div class="chat-user">${data.username}</div>
            <div>${data.message}</div>
        </div>
    `;

    chatMessages.scrollTop = chatMessages.scrollHeight;
};

chatSocket.onclose = function() {
    chatStatus.innerText = "Disconnected";
};

chatSocket.onerror = function(error) {
    chatStatus.innerText = "Connection Error";
    console.log("WebSocket error:", error);
};

function sendMessage() {
    const chatInput = document.getElementById("chatInput");
    const message = chatInput.value.trim();

    if(message === ""){
        return;
    }

    if(chatSocket.readyState !== WebSocket.OPEN){
        alert("Chat is not connected yet");
        return;
    }

    chatSocket.send(JSON.stringify({
        "username": CURRENT_USERNAME,
        "message": message
    }));

    chatInput.value = "";
}

// Initial load
showPanel("home");
</script>

</body>
