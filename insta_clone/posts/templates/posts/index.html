<!DOCTYPE html>
<html>
<head>
    <title>Instagram Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family: Arial, sans-serif;
            background:#fafafa;
            color:#262626;
        }

        .app{
            display:flex;
            min-height:100vh;
        }

        /* LEFT SIDEBAR */
        .sidebar{
            width:245px;
            background:#fff;
            border-right:1px solid #dbdbdb;
            padding:24px 14px;
            position:fixed;
            left:0;
            top:0;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
        }

        .logo{
            font-size:30px;
            font-weight:bold;
            margin-bottom:30px;
            padding:10px 12px;
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .menu-item{
            display:flex;
            align-items:center;
            gap:14px;
            padding:14px 12px;
            border-radius:10px;
            cursor:pointer;
            font-size:18px;
        }

        .menu-item:hover{
            background:#f2f2f2;
        }

        .menu-item.active{
            font-weight:bold;
        }

        .menu-icon{
            width:24px;
            text-align:center;
            font-size:24px;
        }

        /* MAIN FEED AREA */
        .content{
            margin-left:245px;
            width:calc(100% - 245px);
            display:flex;
            justify-content:center;
            gap:28px;
            padding:30px 20px;
        }

        .feed-area{
            width:630px;
        }

        .stories-bar{
            background:#fff;
            border:1px solid #dbdbdb;
            border-radius:8px;
            padding:16px 12px;
            display:flex;
            gap:18px;
            overflow-x:auto;
            margin-bottom:22px;
        }

        .story-item{
            min-width:78px;
            text-align:center;
            font-size:12px;
            color:#262626;
        }

        .story-ring{
            width:66px;
            height:66px;
            margin:0 auto 6px;
            border-radius:50%;
            padding:3px;
            background:linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);
        }

        .story-inner{
            width:100%;
            height:100%;
            border-radius:50%;
            padding:2px;
            background:#fff;
        }

        .story-inner img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:50%;
        }

        .create-card,
        .post-card,
        .chat-card{
            background:#fff;
            border:1px solid #dbdbdb;
            border-radius:8px;
            margin-bottom:22px;
        }

        .create-card{
            padding:18px;
        }

        .create-title{
            font-size:18px;
            font-weight:bold;
            margin-bottom:14px;
        }

        .create-row{
            display:flex;
            flex-direction:column;
            gap:12px;
        }

        .create-row input[type="text"]{
            padding:12px;
            border:1px solid #dbdbdb;
            border-radius:8px;
            outline:none;
        }

        .btn{
            background:#0095f6;
            border:none;
            color:#fff;
            padding:10px 16px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .btn:hover{
            opacity:0.92;
        }

        /* POST */
        .post-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:14px 16px;
        }

        .post-user{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .avatar{
            width:34px;
            height:34px;
            border-radius:50%;
            background:#ddd;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
        }

        .username{
            font-weight:bold;
            font-size:14px;
        }

        .post-time{
            color:#8e8e8e;
            font-size:13px;
        }

        .more{
            font-size:22px;
            cursor:pointer;
        }

        .post-image-wrap{
            position:relative;
            background:#000;
        }

        .post-image{
            width:100%;
            max-height:750px;
            object-fit:cover;
            display:block;
        }

        .heart-overlay{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%) scale(0);
            font-size:90px;
            opacity:0;
            transition:all .25s ease;
            pointer-events:none;
        }

        .heart-overlay.show{
            transform:translate(-50%, -50%) scale(1);
            opacity:1;
        }

        .post-actions{
            display:flex;
            justify-content:space-between;
            padding:12px 16px 8px;
            font-size:24px;
        }

        .post-actions-left{
            display:flex;
            gap:16px;
        }

        .action{
            cursor:pointer;
        }

        .likes-text{
            padding:0 16px 8px;
            font-weight:bold;
            font-size:14px;
        }

        .caption{
            padding:0 16px 10px;
            font-size:14px;
        }

        .comments-box{
            padding:0 16px 10px;
        }

        .comment{
            display:flex;
            justify-content:space-between;
            align-items:flex-start;
            gap:12px;
            margin-bottom:8px;
            font-size:14px;
        }

        .comment-left{
            flex:1;
            line-height:1.4;
        }

        .delete-btn{
            border:none;
            background:none;
            cursor:pointer;
            color:#ed4956;
            font-size:14px;
        }

        .comment-row{
            border-top:1px solid #efefef;
            display:flex;
            gap:10px;
            padding:12px 16px;
        }

        .comment-row input{
            flex:1;
            border:none;
            outline:none;
            font-size:14px;
        }

        .comment-btn{
            border:none;
            background:none;
            color:#0095f6;
            font-weight:bold;
            cursor:pointer;
        }

        /* RIGHT PANEL */
        .right-panel{
            width:320px;
        }

        .profile-box,
        .chat-card{
            background:#fff;
            border:1px solid #dbdbdb;
            border-radius:8px;
        }

        .profile-box{
            padding:18px;
            margin-bottom:18px;
        }

        .profile-row{
            display:flex;
            align-items:center;
            gap:12px;
        }

        .profile-avatar{
            width:52px;
            height:52px;
            border-radius:50%;
            background:#ddd;
            display:flex;
            justify-content:center;
            align-items:center;
            font-weight:bold;
            font-size:20px;
        }

        .profile-name{
            font-weight:bold;
        }

        .profile-sub{
            color:#8e8e8e;
            font-size:14px;
        }

        .chat-title{
            font-size:18px;
            font-weight:bold;
            padding:16px;
            border-bottom:1px solid #efefef;
        }

        #chatStatus{
            color:#8e8e8e;
            font-size:13px;
            padding:0 16px 12px;
        }

        #chatMessages{
            height:380px;
            overflow-y:auto;
            padding:12px 16px;
            background:#fafafa;
        }

        .chat-message{
            background:#fff;
            border:1px solid #efefef;
            border-radius:12px;
            padding:10px 12px;
            margin-bottom:10px;
        }

        .chat-user{
            font-weight:bold;
            margin-bottom:4px;
            font-size:14px;
        }

        .chat-input-row{
            display:flex;
            gap:8px;
            padding:14px 16px;
            border-top:1px solid #efefef;
        }

        .chat-input-row input{
            flex:1;
            padding:10px 12px;
            border:1px solid #dbdbdb;
            border-radius:8px;
            outline:none;
        }

        @media (max-width:1200px){
            .right-panel{
                display:none;
            }
            .feed-area{
                width:640px;
            }
        }

        @media (max-width:900px){
            .sidebar{
                width:80px;
                padding:20px 10px;
            }

            .logo{
                font-size:18px;
                text-align:center;
                padding:0;
            }

            .menu-item span:last-child{
                display:none;
            }

            .content{
                margin-left:80px;
                width:calc(100% - 80px);
            }

            .feed-area{
                width:100%;
                max-width:640px;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <div class="sidebar">
        <div>
            <div class="logo">Instagram</div>

            <div class="menu">
                <div class="menu-item active"><span class="menu-icon">🏠</span><span>Home</span></div>
                <div class="menu-item"><span class="menu-icon">🔍</span><span>Search</span></div>
                <div class="menu-item"><span class="menu-icon">🎬</span><span>Reels</span></div>
                <div class="menu-item"><span class="menu-icon">💬</span><span>Messages</span></div>
                <div class="menu-item"><span class="menu-icon">❤️</span><span>Notifications</span></div>
                <div class="menu-item"><span class="menu-icon">➕</span><span>Create</span></div>
                <div class="menu-item"><span class="menu-icon">👤</span><span>Profile</span></div>
            </div>
        </div>

        <div class="menu">
            <div class="menu-item"><span class="menu-icon">☰</span><span>More</span></div>
        </div>
    </div>

    <div class="content">

        <div class="feed-area">

            <div class="create-card">
                <div class="create-title">Create Post</div>
                <form id="postForm" class="create-row">
                    <input type="file" id="image" required>
                    <input type="text" id="caption" placeholder="Write a caption...">
                    <button class="btn" type="submit">Post</button>
                </form>
            </div>

            <div class="create-card">
                <div class="create-title">Add Story</div>
                <div class="create-row">
                    <input type="file" id="storyImage">
                    <button class="btn" type="button" onclick="uploadStory()">Add Story</button>
                </div>
            </div>

            <div id="storiesContainer" class="stories-bar"></div>

            <div id="posts"></div>
        </div>

        <div class="right-panel">
            <div class="profile-box">
                <div class="profile-row">
                    <div class="profile-avatar" id="profileAvatar">U</div>
                    <div>
                        <div class="profile-name" id="profileName">user</div>
                        <div class="profile-sub">Instagram Clone Demo</div>
                    </div>
                </div>
            </div>

            <div class="chat-card">
                <div class="chat-title">Messages</div>
                <div id="chatStatus">Connecting...</div>
                <div id="chatMessages"></div>

                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Type message">
                    <button class="btn" type="button" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
const API_POSTS = "http://127.0.0.1:8000/api/posts/";
const API_COMMENTS = "http://127.0.0.1:8000/api/comments/";
const API_LIKE = "http://127.0.0.1:8000/api/like/";
const API_DELETE_COMMENT = "http://127.0.0.1:8000/api/comments/delete/";
const API_STORIES = "http://127.0.0.1:8000/api/stories/";

let CURRENT_USERNAME = localStorage.getItem("chat_username");

if(!CURRENT_USERNAME){
    CURRENT_USERNAME = prompt("Enter your name for chat:", "vishnu") || "vishnu";
    localStorage.setItem("chat_username", CURRENT_USERNAME);
}

document.getElementById("profileName").innerText = CURRENT_USERNAME;
document.getElementById("profileAvatar").innerText = CURRENT_USERNAME[0].toUpperCase();


document.getElementById("postForm").onsubmit = async function(e){
    e.preventDefault();

    let imageFile = document.getElementById("image").files[0];
    let caption = document.getElementById("caption").value;

    if(!imageFile){
        alert("Please choose an image");
        return;
    }

    let formData = new FormData();
    formData.append("image", imageFile);
    formData.append("caption", caption);

    try{
        const res = await fetch(API_POSTS,{
            method:"POST",
            body:formData
        });

        if(!res.ok){
            const errorText = await res.text();
            console.log("Post create error response:", errorText);
            alert("Post create failed");
            return;
        }

        await res.json();
        document.getElementById("postForm").reset();
        loadPosts();
    }catch(error){
        console.log("Post create error:", error);
    }
};


async function uploadStory(){
    let file = document.getElementById("storyImage").files[0];

    if(!file){
        alert("Choose an image for story");
        return;
    }

    let formData = new FormData();
    formData.append("image", file);

    try{
        const res = await fetch(API_STORIES, {
            method:"POST",
            body:formData
        });

        if(!res.ok){
            const errorText = await res.text();
            console.log("Story upload error response:", errorText);
            alert("Story upload failed");
            return;
        }

        await res.json();
        document.getElementById("storyImage").value = "";
        loadStories();
    }catch(error){
        console.log("Story upload error:", error);
    }
}


function loadStories(){
    fetch(API_STORIES)
    .then(res=>res.json())
    .then(stories=>{
        let html = "";

        stories.forEach(story=>{
            html += `
                <div class="story-item">
                    <div class="story-ring">
                        <div class="story-inner">
                            <img src="${story.image}" alt="story" onerror="this.style.display='none'">
                        </div>
                    </div>
                    <div>${story.user_name ? story.user_name : "user"}</div>
                </div>
            `;
        });

        document.getElementById("storiesContainer").innerHTML = html;
    })
    .catch(error=>{
        console.log("Load stories error:", error);
    });
}


function loadPosts(){
    fetch(API_POSTS)
    .then(res=>res.json())
    .then(posts=>{
        let html = "";

        posts.forEach(post=>{
            let imageHtml = "";
            if(post.image){
                imageHtml = `
                    <div class="post-image-wrap" ondblclick="doubleTapLike(${post.id})">
                        <img class="post-image" src="${post.image}" alt="post image" onerror="this.style.display='none'">
                        <div class="heart-overlay" id="heart-${post.id}">❤️</div>
                    </div>
                `;
            }

            html += `
                <div class="post-card">
                    <div class="post-header">
                        <div class="post-user">
                            <div class="avatar">${(post.user_name ? post.user_name[0] : "U").toUpperCase()}</div>
                            <div>
                                <div class="username">${post.user_name ? post.user_name : "User"}</div>
                                <div class="post-time">Just now</div>
                            </div>
                        </div>
                        <div class="more">⋯</div>
                    </div>

                    ${imageHtml}

                    <div class="post-actions">
                        <div class="post-actions-left">
                            <span class="action" onclick="likePost(${post.id})">❤️</span>
                            <span class="action">💬</span>
                            <span class="action">📤</span>
                        </div>
                        <div class="action">🔖</div>
                    </div>

                    <div class="likes-text">${post.likes_count ? post.likes_count : 0} likes</div>

                    <div class="caption">
                        <b>${post.user_name ? post.user_name : "User"}</b> ${post.caption ? post.caption : ""}
                    </div>

                    <div class="comments-box" id="comments-${post.id}"></div>

                    <div class="comment-row">
                        <input id="comment-input-${post.id}" type="text" placeholder="Add a comment...">
                        <button class="comment-btn" type="button" onclick="addComment(${post.id})">Post</button>
                    </div>
                </div>
            `;
        });

        document.getElementById("posts").innerHTML = html;
        loadComments();
    })
    .catch(error=>{
        console.log("Load posts error:", error);
    });
}


function addComment(postId){
    let textBox = document.getElementById(`comment-input-${postId}`);
    let text = textBox.value.trim();

    if(text === ""){
        alert("Write a comment");
        return;
    }

    fetch(API_COMMENTS,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            post: postId,
            text: text
        })
    })
    .then(res=>res.json())
    .then(data=>{
        textBox.value = "";
        loadPosts();
    })
    .catch(error=>{
        console.log("Comment create error:", error);
    });
}


function loadComments(){
    fetch(API_COMMENTS)
    .then(res=>res.json())
    .then(comments=>{
        document.querySelectorAll("[id^='comments-']").forEach(box=>{
            box.innerHTML = "";
        });

        comments.forEach(comment=>{
            let box = document.getElementById(`comments-${comment.post}`);

            if(box){
                box.innerHTML += `
                    <div class="comment">
                        <div class="comment-left">
                            <b>${comment.user_name ? comment.user_name : "User"}</b> ${comment.text}
                        </div>
                        <button class="delete-btn" type="button" onclick="deleteComment(${comment.id})">Delete</button>
                    </div>
                `;
            }
        });
    })
    .catch(error=>{
        console.log("Load comments error:", error);
    });
}


function likePost(postId){
    fetch(API_LIKE,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            post: postId
        })
    })
    .then(res=>res.json())
    .then(data=>{
        loadPosts();
    })
    .catch(error=>{
        console.log("Like error:", error);
    });
}


function doubleTapLike(postId){
    likePost(postId);

    let heart = document.getElementById(`heart-${postId}`);
    if(heart){
        heart.classList.add("show");
        setTimeout(()=>{
            heart.classList.remove("show");
        }, 700);
    }
}


function deleteComment(commentId){
    fetch(`${API_DELETE_COMMENT}${commentId}/`,{
        method:"DELETE"
    })
    .then(()=>{
        loadPosts();
    })
    .catch(error=>{
        console.log("Delete comment error:", error);
    });
}


// Chat
const chatStatus = document.getElementById("chatStatus");
const chatMessages = document.getElementById("chatMessages");
const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
const chatSocket = new WebSocket(protocol + window.location.host + "/ws/chat/");

chatSocket.onopen = function() {
    chatStatus.innerText = "Connected";
};

chatSocket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    chatMessages.innerHTML += `
        <div class="chat-message">
            <div class="chat-user">${data.username}</div>
            <div>${data.message}</div>
        </div>
    `;

    chatMessages.scrollTop = chatMessages.scrollHeight;
};

chatSocket.onclose = function() {
    chatStatus.innerText = "Disconnected";
};

chatSocket.onerror = function(error) {
    chatStatus.innerText = "Connection Error";
    console.log("WebSocket error:", error);
};

function sendMessage() {
    const chatInput = document.getElementById("chatInput");
    const message = chatInput.value.trim();

    if(message === ""){
        return;
    }

    if(chatSocket.readyState !== WebSocket.OPEN){
        alert("Chat is not connected yet");
        return;
    }

    chatSocket.send(JSON.stringify({
        "username": CURRENT_USERNAME,
        "message": message
    }));

    chatInput.value = "";
}


loadStories();
loadPosts();
</script>

</body>
</html>
